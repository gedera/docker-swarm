version: 2
updates:
  - package-ecosystem: "bundler"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      development-dependencies:
        patterns:
          - "rubocop*"
          - "rspec*"
          - "pry*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
